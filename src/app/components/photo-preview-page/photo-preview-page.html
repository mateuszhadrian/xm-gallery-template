@if (photo(); as photo) {
  <div class="preview">
    <img class="preview-image" [src]="photo.url" [alt]="photo.author" />
  </div>

  @if (isFavorite()) {
    <footer class="footer">
      <button matFab extended type="button" (click)="removeFromFavorites(photo.id)">
        Remove from favorites
      </button>
    </footer>
  }
}
