<div class="grid" #scrollContainer>
  @for (photo of photos(); track photo.id) {
    <button type="button" class="tile" (click)="photoClick.emit(photo)">
      <img [src]="photo.url" [alt]="photo.author" />
      @if (isFavorite(photo.id)) {
        <mat-icon class="star-badge">grade-icon</mat-icon>
      }
    </button>
  }
  @if (infiniteScroll()) {
    <div #sentinel class="sentinel"></div>
  }
</div>

<footer class="footer" aria-live="polite">
  @if (loading()) {
    <mat-spinner class="loader" diameter="48" aria-label="Loading more photos"></mat-spinner>
  }
</footer>
